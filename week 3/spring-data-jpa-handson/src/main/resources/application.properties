# h2 in-memory db, handout uses mysql but this runs anywhere with no server to set up
spring.datasource.url=jdbc:h2:mem:ormlearn
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# let hibernate build the schema from the entities on startup and drop it after
spring.jpa.hibernate.ddl-auto=create-drop
# print the sql hibernate runs so you can actually see whats happening
spring.jpa.show-sql=true
